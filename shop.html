<!DOCTYPE html>
<html>
<head>
    <title>Shop - RAJ TECH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shop-container">

    <!-- SIDEBAR -->
    <div class="shop-sidebar">

        <h3>Categories</h3>
        <a href="#">📱 Mobile</a>
        <a href="#">💻 Laptop</a>
        <a href="#">🎧 Headphones</a>
        <a href="#">🔌 Accessories</a>

        <h3>Price</h3>
        <a href="#">Under ₹5,000</a>
        <a href="#">₹5,000 - ₹20,000</a>
        <a href="#">Above ₹20,000</a>

    </div>

    <!-- MAIN -->
    <div class="shop-main">

        <!-- TOP BAR -->
        <div class="shop-top">
            <p>Showing 6 products</p>

            <select>
                <option>Sort by</option>
                <option>Price Low to High</option>
                <option>Price High to Low</option>
            </select>
        </div>

        <!-- PRODUCTS -->
        <div class="shop-products">

            <!-- PRODUCT -->
            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Smartphone</h3>
                <p>₹10,000</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Laptop</h3>
                <p>₹50,000</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Headphones</h3>
                <p>₹2,000</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Smart Watch</h3>
                <p>₹3,500</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Gaming Mouse</h3>
                <p>₹1,500</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Keyboard</h3>
                <p>₹2,200</p>
                <button>Add to Cart</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
