<!DOCTYPE html>
<html>
<head>
    <title>Cart - RAJ TECH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cart-container">

    <h2>🛒 Your Cart</h2>

    <!-- CART ITEMS -->
    <div class="cart-items">

        <div class="cart-item">
            <img src="https://via.placeholder.com/100">
            <div class="item-details">
                <h3>Mobile</h3>
                <p>Price: ₹10,000</p>
                <p>Quantity: 1</p>
            </div>
        </div>

        <div class="cart-item">
            <img src="https://via.placeholder.com/100">
            <div class="item-details">
                <h3>Laptop</h3>
                <p>Price: ₹50,000</p>
                <p>Quantity: 1</p>
            </div>
        </div>

    </div>

    <!-- TOTAL -->
    <div class="cart-total">
        <h3>Total: ₹60,000</h3>
        <button>Proceed to Checkout</button>
    </div>

</div>

</body>
</html>
